<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AO Map Extractor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px}
h1{text-align:center;color:#00d4ff;margin-bottom:5px}
.sub{text-align:center;color:#666;font-size:12px;margin-bottom:20px}
.drop{border:2px dashed #444;border-radius:12px;padding:40px;text-align:center;background:#16213e;cursor:pointer;margin-bottom:15px}
.drop:hover,.drop.over{border-color:#00d4ff;background:#1a2744}
.drop h2{color:#00d4ff;font-size:18px}
.drop p{color:#888;font-size:13px;margin-top:8px}
.drop input{display:none}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.stat{background:#16213e;border:1px solid #333;border-radius:8px;padding:12px 20px;text-align:center;flex:1;min-width:120px}
.stat .n{font-size:28px;font-weight:bold;color:#00d4ff}
.stat .l{font-size:11px;color:#888}
#output{width:100%;height:400px;background:#111;color:#0f0;border:1px solid #333;border-radius:8px;padding:10px;font-family:Consolas,monospace;font-size:11px;resize:vertical;display:none}
.btns{display:flex;gap:8px;margin:15px 0;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold}
.btn-copy{background:#00d4ff;color:#1a1a2e}
.btn-copy:hover{background:#33ddff}
.btn-clear{background:#333;color:#ccc}
.btn-clear:hover{background:#444}
#msg{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:#0f3460;border:1px solid #00d4ff;border-radius:8px;font-size:13px;display:none;z-index:99}
</style>
</head>
<body>

<h1>AO Map Extractor</h1>
<p class="sub">Arrastra .MAP .INF .DAT - Todo se procesa en tu navegador, nada se sube</p>

<div class="drop" id="drop">
<h2>Arrastra archivos aca</h2>
<p>.MAP, .INF, .DAT</p>
<input type="file" id="fi" multiple accept=".map,.inf,.dat,.MAP,.INF,.DAT">
</div>

<div class="stats" id="stats" style="display:none">
<div class="stat"><div class="n" id="sFiles">0</div><div class="l">Archivos</div></div>
<div class="stat"><div class="n" id="sNpcs">0</div><div class="l">NPCs</div></div>
<div class="stat"><div class="n" id="sObjs">0</div><div class="l">Objetos</div></div>
<div class="stat"><div class="n" id="sExits">0</div><div class="l">Exits</div></div>
<div class="stat"><div class="n" id="sTrig">0</div><div class="l">Triggers</div></div>
</div>

<div class="btns" id="btns" style="display:none">
<button class="btn btn-copy" onclick="downloadJSON()">DESCARGAR JSON</button>
<button class="btn btn-copy" style="background:#0a6" onclick="copyAll()">COPIAR AL PORTAPAPELES</button>
<button class="btn btn-clear" onclick="clearAll()">Limpiar</button>
</div>

<textarea id="output" readonly></textarea>

<div id="msg"></div>

<script>
const drop=document.getElementById('drop'),fi=document.getElementById('fi'),out=document.getElementById('output');
const files=new Map();

drop.onclick=()=>fi.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');handle(e.dataTransfer.files)};
fi.onchange=e=>handle(e.target.files);

function handle(list){
for(const f of list){const r=new FileReader();r.onload=()=>{
files.set(f.name,{type:f.name.split('.').pop().toLowerCase(),data:new Uint8Array(r.result),size:f.size});
process();};r.readAsArrayBuffer(f);}
}

function r16(d,o){let v=d[o]|(d[o+1]<<8);return v>0x7FFF?v-0x10000:v}
function u16(d,o){return d[o]|(d[o+1]<<8)}
function r32(d,o){return d[o]|(d[o+1]<<8)|(d[o+2]<<16)|(d[o+3]<<24)}

function parseMap(data){
const R={triggers:[],blocked:0};
let o=2+263+8;// version+copyright+extras
for(let y=1;y<=100;y++)for(let x=1;x<=100;x++){
if(o>=data.length)break;
const f=data[o++];
o+=2;// layer1
if(f&2)o+=2;if(f&4)o+=2;if(f&8)o+=2;
if(f&16){const t=r16(data,o);o+=2;if(t>0)R.triggers.push({x,y,t});}
if(f&1)R.blocked++;
}return R}

function parseInf(data){
const R={npcs:[],objs:[],exits:[],format:'?'};
let txt=0;for(let i=0;i<Math.min(200,data.length);i++)if((data[i]>=32&&data[i]<=126)||data[i]==10||data[i]==13)txt++;
if(txt>Math.min(200,data.length)*0.7){parseInfINI(data,R);return R}
parseInfBin(data,R);return R}

function parseInfINI(data,R){
R.format='INI';
const t=new TextDecoder('latin1').decode(data);
const lines=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
let sec=null,sd={};
function flush(){if(!sec)return;
const npc=parseInt(sd.NPC||sd.NPCINDEX||'0');
const oi=parseInt(sd.OBJ||sd.OBJINDEX||sd.OBJINFO||'0');
const oa=parseInt(sd.OBJAMOUNT||sd.AMOUNT||sd.CANTIDAD||'1');
let em=0,ex=0,ey=0;
const te=sd.TILEEXIT||sd.EXIT||'';
if(te){const p=te.replace(/,/g,'-').split('-').map(Number);if(p.length>=3){em=p[0];ex=p[1];ey=p[2]}}
em=em||parseInt(sd.EXITMAP||sd.MAPATRANSPORTE||'0');
ex=ex||parseInt(sd.EXITX||'0');ey=ey||parseInt(sd.EXITY||'0');
let px=0,py=0;const m=sec.match(/(\d+)\s*[,\-]\s*(\d+)/);if(m){px=+m[1];py=+m[2]}
if(npc>0)R.npcs.push({x:px,y:py,n:npc});
if(oi>0)R.objs.push({x:px,y:py,i:oi,a:oa});
if(em>0)R.exits.push({x:px,y:py,m:em,ex,ey})}
for(const raw of lines){const l=raw.trim();
if(!l||l[0]==';'||l[0]=="'")continue;
if(l[0]=='['&&l.includes(']')){flush();sec=l.slice(1,l.indexOf(']')).trim();sd={};continue}
const eq=l.indexOf('=');if(eq>0&&sec)sd[l.slice(0,eq).trim().toUpperCase()]=l.slice(eq+1).trim()}
flush()}

function parseInfBin(data,R){
const sz=data.length;
const fmts=[[12,'12B'],[10,'10B'],[8,'8B'],[6,'6B'],[4,'4B']];
for(const[bpt,nm]of fmts){
for(const hdr of[0,2,4,8]){
if(Math.abs(sz-hdr-bpt*10000)>50)continue;
R.format=`BIN ${nm} hdr=${hdr}`;let o=hdr;
for(let y=1;y<=100;y++)for(let x=1;x<=100;x++){
if(o+bpt>sz)break;const v=[];for(let i=0;i<bpt;i+=2)v.push(r16(data,o+i));o+=bpt;
const npc=v[0]||0,oi=v[1]||0,oa=v[2]||0,em=v[3]||0,exx=v[4]||0,eyy=v[5]||0;
if(npc>0)R.npcs.push({x,y,n:npc});
if(oi>0)R.objs.push({x,y,i:oi,a:oa>0?oa:1});
if(em>0)R.exits.push({x,y,m:em,ex:exx,ey:eyy})}
return}}
R.format='DESCONOCIDO '+sz+'B';
R.hex=Array.from(data.slice(0,128)).map(b=>b.toString(16).padStart(2,'0')).join(' ')}

function process(){
const result={};let tNpc=0,tObj=0,tEx=0,tTrig=0;
for(const[name,info]of files){
const num=name.replace(/\.[^.]+$/,'');
if(!result[num])result[num]={};
if(info.type==='map'){const r=parseMap(info.data);result[num].map={triggers:r.triggers.length,blocked:r.blocked};tTrig+=r.triggers.length}
if(info.type==='inf'){const r=parseInf(info.data);result[num].inf={format:r.format,npcs:r.npcs,objs:r.objs,exits:r.exits};
if(r.hex)result[num].inf.hex=r.hex;
tNpc+=r.npcs.length;tObj+=r.objs.length;tEx+=r.exits.length}
if(info.type==='dat'){result[num].dat='loaded'}}

document.getElementById('stats').style.display='flex';
document.getElementById('btns').style.display='flex';
out.style.display='block';
document.getElementById('sFiles').textContent=files.size;
document.getElementById('sNpcs').textContent=tNpc;
document.getElementById('sObjs').textContent=tObj;
document.getElementById('sExits').textContent=tEx;
document.getElementById('sTrig').textContent=tTrig;
out.value=JSON.stringify(result,null,1)}

function downloadJSON(){
const blob=new Blob([out.value],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='mapas_extraidos.json';
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
msg('Descargado: mapas_extraidos.json')}

function copyAll(){
out.select();document.execCommand('copy');
msg('Copiado al portapapeles!')}

function msg(t){const m=document.getElementById('msg');m.textContent=t;m.style.display='block';setTimeout(()=>m.style.display='none',2500)}

function clearAll(){files.clear();out.value='';out.style.display='none';
document.getElementById('stats').style.display='none';
document.getElementById('btns').style.display='none'}
</script>
</body>
</html>
