<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS Map Inspector</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent-primary: #e94560;
            --accent-secondary: #0f3460;
            --accent-gradient: linear-gradient(135deg, #e94560, #0f3460);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(26, 26, 46, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        h1 {
            font-size: 2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem; }

        .drop-zone {
            border: 2px dashed var(--border-color); border-radius: 16px;
            padding: 2rem; text-align: center; cursor: pointer;
            transition: all 0.3s; background: var(--bg-secondary); margin-bottom: 1.5rem;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-primary); background: rgba(233, 69, 96, 0.05);
        }
        .drop-zone .icon { font-size: 3rem; margin-bottom: 0.5rem; opacity: 0.5; }
        .drop-zone p { color: var(--text-secondary); margin-bottom: 0.3rem; }
        .drop-zone .hint { font-size: 0.8rem; opacity: 0.6; }

        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.5rem; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.3s;
        }
        .btn-primary {
            background: var(--accent-gradient); color: white;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 30px rgba(233, 69, 96, 0.5); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--accent-secondary); }

        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 0.75rem; text-align: center;
        }
        .stat-card .num { font-size: 1.5rem; font-weight: 700; color: var(--accent-primary); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-secondary); }

        .actions { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
        .copy-status { color: #6ecf6e; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; }
        .copy-status.show { opacity: 1; }

        .progress-bar-container {
            height: 6px; background: var(--bg-tertiary); border-radius: 3px;
            overflow: hidden; margin-bottom: 1rem; display: none;
        }
        .progress-bar-fill { height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.2s; }

        /* Results */
        .results { display: none; }
        .map-card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem;
        }
        .map-card-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        .map-card-header h3 { font-size: 0.95rem; color: var(--accent-primary); }
        .map-card-header .badges { display: flex; gap: 0.4rem; }
        .badge {
            font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px;
            font-weight: 600;
        }
        .badge-exit { background: #1a4a3a; color: #4ade80; }
        .badge-npc { background: #3a1a4a; color: #c084fc; }
        .badge-obj { background: #4a3a1a; color: #fbbf24; }
        .badge-trigger { background: #1a2a4a; color: #60a5fa; }
        .badge-blocked { background: #4a1a1a; color: #f87171; }
        .badge-dat { background: #1a3a3a; color: #67e8f9; }

        .map-card-body { display: none; margin-top: 0.75rem; }
        .map-card.open .map-card-body { display: block; }
        .map-card.open .toggle-arrow { transform: rotate(90deg); }
        .toggle-arrow { transition: transform 0.2s; color: var(--text-secondary); }

        .data-table {
            width: 100%; font-size: 0.8rem; border-collapse: collapse;
        }
        .data-table th {
            text-align: left; padding: 0.4rem 0.6rem;
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .data-table td {
            padding: 0.3rem 0.6rem; border-bottom: 1px solid var(--border-color);
            font-family: 'Consolas', monospace; font-size: 0.8rem;
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.03); }

        .dat-content {
            background: var(--bg-tertiary); border-radius: 8px;
            padding: 0.75rem; font-family: 'Consolas', monospace;
            font-size: 0.8rem; line-height: 1.5; color: #67e8f9;
            max-height: 200px; overflow-y: auto;
        }

        .section-title {
            font-size: 0.8rem; color: var(--text-secondary);
            margin: 0.75rem 0 0.5rem; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .json-output {
            width: 100%; min-height: 150px; max-height: 300px;
            background: var(--bg-secondary); color: #80e080; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 1rem; font-family: 'Consolas', monospace;
            font-size: 0.75rem; resize: vertical; margin-top: 1rem;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-secondary); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TDS Map Inspector</h1>
        <p class="subtitle">Subi archivos .inf y .dat de AO. Se parsean en el browser y se muestran los datos. Nada se descarga ni se sube a ningun servidor.</p>

        <div class="drop-zone" id="dropZone">
            <div class="icon">&#128270;</div>
            <p>Arrastra archivos .inf y .dat aqui</p>
            <p class="hint">Tambien acepta .map si queres verificar su contenido</p>
        </div>
        <div class="actions" style="margin-bottom:1rem;">
            <button class="btn btn-secondary" id="btnSelectFolder">Seleccionar Carpeta</button>
            <button class="btn btn-secondary" id="btnSelectFiles">Seleccionar Archivos</button>
            <span id="loadStatus" style="color:var(--text-secondary);font-size:0.85rem;"></span>
        </div>
        <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
        <input type="file" id="fileInput" multiple accept=".inf,.dat,.map" style="display:none">

        <div class="stats">
            <div class="stat-card"><div class="num" id="cntInf">0</div><div class="label">.inf</div></div>
            <div class="stat-card"><div class="num" id="cntDat">0</div><div class="label">.dat</div></div>
            <div class="stat-card"><div class="num" id="cntMap">0</div><div class="label">.map</div></div>
            <div class="stat-card"><div class="num" id="cntTotal">0</div><div class="label">Total datos</div></div>
        </div>

        <div class="progress-bar-container" id="progC"><div class="progress-bar-fill" id="progBar"></div></div>

        <div class="actions">
            <button class="btn btn-primary" id="btnInspect" disabled>Inspeccionar Archivos</button>
            <button class="btn btn-secondary" id="btnCopyJSON" style="display:none">Copiar JSON Limpio</button>
            <button class="btn btn-secondary" id="btnExpandAll" style="display:none">Expandir Todo</button>
            <button class="btn btn-secondary" id="btnCollapseAll" style="display:none">Colapsar Todo</button>
            <span class="copy-status" id="copyStatus">Copiado!</span>
        </div>

        <div class="results" id="results">
            <div id="mapCards"></div>
        </div>

        <textarea class="json-output" id="jsonOutput" style="display:none" readonly></textarea>
    </div>

<script>
'use strict';

const MAP_SIZE = 100;
const HEADER_SIZE = 273;
const MAX_GRH = 70000, MAX_MAP_NUM = 2000, MAX_NPC = 10000, MAX_OBJ = 10000;
const V = {
    grh: v => v >= 0 && v <= MAX_GRH,
    map: v => v >= 0 && v <= MAX_MAP_NUM,
    coord: v => v >= 0 && v <= MAP_SIZE,
    npc: v => v >= 0 && v <= MAX_NPC,
    obj: v => v >= 0 && v <= MAX_OBJ,
    amt: v => v >= 0 && v <= 50000,
    trg: v => v >= 0 && v <= 65535,
};

let loaded = { inf: {}, dat: {}, map: {} };
let parsedData = {}; // { "1": { inf: {...}, dat: {...}, map: {...} } }

document.addEventListener('DOMContentLoaded', () => {
    const dz = document.getElementById('dropZone');
    const fi = document.getElementById('folderInput');
    const fiFiles = document.getElementById('fileInput');
    const statusEl = document.getElementById('loadStatus');

    // Drag and drop
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', async e => {
        e.preventDefault(); dz.classList.remove('dragover');
        statusEl.textContent = 'Leyendo archivos...';
        const files = [];
        for (const item of (e.dataTransfer.items || [])) {
            if (item.kind !== 'file') continue;
            const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
            if (entry && entry.isDirectory) { await readDir(entry, files); continue; }
            files.push(item.getAsFile());
        }
        if (!files.length && e.dataTransfer.files.length) files.push(...e.dataTransfer.files);
        statusEl.textContent = `${files.length} archivos encontrados, cargando...`;
        await loadFiles(files);
    });

    // Button: select folder
    document.getElementById('btnSelectFolder').addEventListener('click', () => fi.click());
    fi.addEventListener('change', async () => {
        const files = Array.from(fi.files);
        statusEl.textContent = `${files.length} archivos en carpeta, cargando...`;
        await loadFiles(files);
    });

    // Button: select individual files
    document.getElementById('btnSelectFiles').addEventListener('click', () => fiFiles.click());
    fiFiles.addEventListener('change', async () => {
        const files = Array.from(fiFiles.files);
        statusEl.textContent = `${files.length} archivos seleccionados, cargando...`;
        await loadFiles(files);
    });

    document.getElementById('btnInspect').addEventListener('click', inspect);
    document.getElementById('btnCopyJSON').addEventListener('click', copyJSON);
    document.getElementById('btnExpandAll').addEventListener('click', () => toggleAll(true));
    document.getElementById('btnCollapseAll').addEventListener('click', () => toggleAll(false));
});

function readDir(dir, files) {
    return new Promise(resolve => {
        const r = dir.createReader();
        const go = () => r.readEntries(async entries => {
            if (!entries.length) { resolve(); return; }
            for (const e of entries) {
                if (e.isFile) files.push(await new Promise(r2 => e.file(r2)));
                else if (e.isDirectory) await readDir(e, files);
            }
            go();
        });
        go();
    });
}

async function loadFiles(files) {
    loaded = { inf: {}, dat: {}, map: {} };
    const statusEl = document.getElementById('loadStatus');
    const progC = document.getElementById('progC');
    const progBar = document.getElementById('progBar');
    progC.style.display = 'block';

    // Filter valid files first
    const valid = [];
    let skipped = 0;
    for (const f of files) {
        const m = f.name.toLowerCase().match(/^(\d+)\.(inf|dat|map)$/);
        if (m) valid.push({ file: f, num: m[1], ext: m[2] });
        else skipped++;
    }

    statusEl.textContent = `${valid.length} archivos validos de ${files.length} (${skipped} ignorados). Leyendo...`;

    // Load in batches of 20 to not freeze the browser
    const BATCH = 20;
    for (let i = 0; i < valid.length; i += BATCH) {
        const batch = valid.slice(i, i + BATCH);
        await Promise.all(batch.map(async ({ file, num, ext }) => {
            try {
                loaded[ext][num] = await file.arrayBuffer();
            } catch (e) {
                console.error(`Error reading ${file.name}:`, e);
            }
        }));
        progBar.style.width = (Math.min(i + BATCH, valid.length) / valid.length * 100) + '%';
        statusEl.textContent = `Leidos ${Math.min(i + BATCH, valid.length)} de ${valid.length}...`;
        // Yield to UI
        await new Promise(r => setTimeout(r, 0));
    }

    const ni = Object.keys(loaded.inf).length;
    const nd = Object.keys(loaded.dat).length;
    const nm = Object.keys(loaded.map).length;
    const t = ni + nd + nm;
    document.getElementById('cntInf').textContent = ni;
    document.getElementById('cntDat').textContent = nd;
    document.getElementById('cntMap').textContent = nm;
    document.getElementById('cntTotal').textContent = t;
    document.getElementById('btnInspect').disabled = t === 0;
    statusEl.textContent = t > 0 ? `${t} archivos cargados (${ni} .inf, ${nd} .dat, ${nm} .map). Click Inspeccionar.` : 'No se encontraron archivos validos (deben llamarse 1.inf, 2.dat, etc.)';
    progC.style.display = 'none';
}

// ============================================================
// PARSERS
// ============================================================

function parseInf(buf) {
    const view = new DataView(buf), len = buf.byteLength;
    let off = 0;
    const i16 = () => { const v = view.getInt16(off, true); off += 2; return v; };
    const u8 = () => view.getUint8(off++);

    let version = 0;
    if (len > HEADER_SIZE && view.getUint8(2) === 0x41) {
        version = view.getInt16(0, true);
        off = HEADER_SIZE;
    }

    const rem = len - off;
    const bpt = Math.round(rem / (MAP_SIZE * MAP_SIZE));
    // tiles: array of ALL tiles with any non-zero data
    // each: [x, y, blocked, trigger, exitMap, exitX, exitY, npcIndex, objIndex, objAmount]
    const tiles = [];
    let warn = 0, stats = { exits: 0, npcs: 0, objs: 0, triggers: 0, blocked: 0 };

    function processTile(x, y, bl, tr, em, ex, ey, ni, oi, oa) {
        if (bl > 1) bl = 1;
        if (!V.trg(tr)) { tr = 0; warn++; }
        if (!V.map(em)) { em = 0; ex = 0; ey = 0; warn++; }
        if (!V.coord(ex)) { ex = 0; warn++; }
        if (!V.coord(ey)) { ey = 0; warn++; }
        if (!V.npc(ni)) { ni = 0; warn++; }
        if (!V.obj(oi)) { oi = 0; warn++; }
        if (!V.amt(oa)) { oa = 0; warn++; }
        if (bl) stats.blocked++;
        if (tr > 0) stats.triggers++;
        if (em > 0) stats.exits++;
        if (ni > 0) stats.npcs++;
        if (oi > 0) stats.objs++;
        // Only store tiles that have any data
        if (bl || tr || em || ni || oi) {
            tiles.push([x+1, y+1, bl, tr, em, ex, ey, ni, oi, oa]);
        }
    }

    if (bpt >= 15 && bpt <= 20) {
        for (let y = 0; y < MAP_SIZE; y++) for (let x = 0; x < MAP_SIZE; x++) {
            const start = off;
            if (off + bpt > len) continue;
            let bl = u8(), tr = i16(), em = i16(), ex = i16(), ey = i16(), ni = i16(), oi = i16(), oa = i16();
            off = start + bpt;
            processTile(x, y, bl, tr, em, ex, ey, ni, oi, oa);
        }
    } else if (rem > MAP_SIZE * MAP_SIZE) {
        for (let y = 0; y < MAP_SIZE; y++) for (let x = 0; x < MAP_SIZE; x++) {
            if (off >= len) continue;
            const flags = u8();
            let bl = (flags & 1) ? 1 : 0, tr = 0, em = 0, ex = 0, ey = 0, ni = 0, oi = 0, oa = 0;
            if ((flags & 2) && off+2<=len) tr = i16();
            if ((flags & 4) && off+6<=len) { em = i16(); ex = i16(); ey = i16(); }
            if ((flags & 8) && off+2<=len) ni = i16();
            if ((flags & 16) && off+4<=len) { oi = i16(); oa = i16(); }
            processTile(x, y, bl, tr, em, ex, ey, ni, oi, oa);
        }
    } else {
        return null;
    }
    return { version, tiles, stats, warnings: warn };
}

function parseDat(buf) {
    const text = new TextDecoder('latin1').decode(buf);
    const data = {};
    for (const line of text.split(/\r?\n/)) {
        const t = line.trim();
        if (!t || t.startsWith('[')) continue;
        const eq = t.indexOf('=');
        if (eq > 0) {
            const key = t.substring(0, eq).trim();
            const val = t.substring(eq + 1).trim().replace(/[^\x20-\x7E\xC0-\xFF]/g, '');
            if (/^[A-Za-z_]\w*$/.test(key)) data[key] = val;
        }
    }
    return data;
}

function parseMap(buf) {
    const view = new DataView(buf), len = buf.byteLength;
    if (len < HEADER_SIZE + 10000) return null;
    let off = 0;
    const i16 = () => { const v = view.getInt16(off, true); off += 2; return v; };
    const u8 = () => view.getUint8(off++);
    const can = n => off + n <= len;

    const version = i16();
    off = HEADER_SIZE;
    let layers = [0, 0, 0, 0], triggers = 0, blocked = 0, totalGrh = 0;
    for (let y = 0; y < MAP_SIZE; y++) for (let x = 0; x < MAP_SIZE; x++) {
        if (!can(3)) break;
        const f = u8();
        if (f & 1) blocked++;
        if (can(2)) { const g = i16(); if (g > 0) { layers[0]++; totalGrh++; } }
        if ((f & 2) && can(2)) { const g = i16(); if (g > 0) { layers[1]++; totalGrh++; } }
        if ((f & 4) && can(2)) { const g = i16(); if (g > 0) { layers[2]++; totalGrh++; } }
        if ((f & 8) && can(2)) { const g = i16(); if (g > 0) { layers[3]++; totalGrh++; } }
        if ((f & 16) && can(2)) { i16(); triggers++; }
    }
    return { version, layers, triggers, blocked, totalGrh };
}

// ============================================================
// INSPECT & RENDER
// ============================================================

async function inspect() {
    const progC = document.getElementById('progC');
    const progBar = document.getElementById('progBar');
    progC.style.display = 'block';
    parsedData = {};

    const allNums = new Set([...Object.keys(loaded.inf), ...Object.keys(loaded.dat), ...Object.keys(loaded.map)]);
    const nums = Array.from(allNums).sort((a, b) => parseInt(a) - parseInt(b));
    let totalData = 0;

    for (let i = 0; i < nums.length; i++) {
        const num = nums[i];
        progBar.style.width = ((i + 1) / nums.length * 100) + '%';
        parsedData[num] = {};

        if (loaded.inf[num]) {
            const inf = parseInf(loaded.inf[num]);
            if (inf) { parsedData[num].inf = inf; totalData += inf.tiles.length; }
        }
        if (loaded.dat[num]) {
            parsedData[num].dat = parseDat(loaded.dat[num]);
            totalData += Object.keys(parsedData[num].dat).length;
        }
        if (loaded.map[num]) {
            parsedData[num].map = parseMap(loaded.map[num]);
            if (parsedData[num].map) totalData++;
        }
        // Yield to UI
        if (i % 20 === 0) await new Promise(r => setTimeout(r, 0));
    }

    document.getElementById('cntTotal').textContent = totalData;
    renderCards(nums);
    buildJSON(nums);

    progC.style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('btnCopyJSON').style.display = '';
    document.getElementById('btnExpandAll').style.display = '';
    document.getElementById('btnCollapseAll').style.display = '';
}

function renderCards(nums) {
    const container = document.getElementById('mapCards');
    container.innerHTML = '';

    for (const num of nums) {
        const d = parsedData[num];
        const card = document.createElement('div');
        card.className = 'map-card';

        // Header with badges
        const header = document.createElement('div');
        header.className = 'map-card-header';

        const title = document.createElement('h3');
        let titleText = `Mapa ${num}`;
        if (d.dat && d.dat.NOMBRE) titleText += ` - ${d.dat.NOMBRE}`;
        else if (d.dat && d.dat.Name) titleText += ` - ${d.dat.Name}`;
        title.innerHTML = `<span class="toggle-arrow">&#9654;</span> ${titleText}`;

        const badges = document.createElement('div');
        badges.className = 'badges';
        if (d.inf) {
            const s = d.inf.stats;
            if (s.exits) badges.innerHTML += `<span class="badge badge-exit">Exits: ${s.exits}</span>`;
            if (s.npcs) badges.innerHTML += `<span class="badge badge-npc">NPCs: ${s.npcs}</span>`;
            if (s.objs) badges.innerHTML += `<span class="badge badge-obj">Objs: ${s.objs}</span>`;
            if (s.triggers) badges.innerHTML += `<span class="badge badge-trigger">Triggers: ${s.triggers}</span>`;
            if (s.blocked) badges.innerHTML += `<span class="badge badge-blocked">Blocked: ${s.blocked}</span>`;
        }
        if (d.dat) badges.innerHTML += `<span class="badge badge-dat">.dat</span>`;
        if (d.map) badges.innerHTML += `<span class="badge" style="background:#2a2a1a;color:#d4d4aa">.map v${d.map.version}</span>`;

        header.appendChild(title);
        header.appendChild(badges);
        header.addEventListener('click', () => card.classList.toggle('open'));

        // Body
        const body = document.createElement('div');
        body.className = 'map-card-body';

        // .dat section
        if (d.dat && Object.keys(d.dat).length > 0) {
            body.innerHTML += '<div class="section-title">.dat (configuracion)</div>';
            const pre = document.createElement('div');
            pre.className = 'dat-content';
            pre.textContent = Object.entries(d.dat).map(([k, v]) => `${k}=${v}`).join('\n');
            body.appendChild(pre);
        }

        // .inf sections - tiles format: [x, y, blocked, trigger, exitMap, exitX, exitY, npcIndex, objIndex, objAmount]
        if (d.inf) {
            const exits = d.inf.tiles.filter(t => t[4] > 0);    // exitMap > 0
            const npcs = d.inf.tiles.filter(t => t[7] > 0);     // npcIndex > 0
            const objs = d.inf.tiles.filter(t => t[8] > 0);     // objIndex > 0
            const triggers = d.inf.tiles.filter(t => t[3] > 1); // trigger > 1 (1=just blocked)

            if (exits.length > 0) {
                body.innerHTML += '<div class="section-title">Exits / Teleports</div>';
                body.appendChild(makeTable(
                    ['X', 'Y', 'Bloq', 'Mapa Destino', 'Dest X', 'Dest Y'],
                    exits.map(t => [t[0], t[1], t[2]?'Si':'', t[4], t[5], t[6]])
                ));
            }
            if (npcs.length > 0) {
                body.innerHTML += '<div class="section-title">NPCs</div>';
                body.appendChild(makeTable(
                    ['X', 'Y', 'Bloq', 'NPC Index'],
                    npcs.map(t => [t[0], t[1], t[2]?'Si':'', t[7]])
                ));
            }
            if (objs.length > 0) {
                body.innerHTML += '<div class="section-title">Objetos</div>';
                body.appendChild(makeTable(
                    ['X', 'Y', 'Bloq', 'Obj Index', 'Cantidad'],
                    objs.map(t => [t[0], t[1], t[2]?'Si':'', t[8], t[9]])
                ));
            }
            if (triggers.length > 0) {
                body.innerHTML += '<div class="section-title">Triggers</div>';
                body.appendChild(makeTable(
                    ['X', 'Y', 'Bloq', 'Valor'],
                    triggers.map(t => [t[0], t[1], t[2]?'Si':'', t[3]])
                ));
            }
            if (d.inf.warnings > 0) {
                body.innerHTML += `<div class="section-title" style="color:#f0c040">Valores fuera de rango corregidos: ${d.inf.warnings}</div>`;
            }
        }

        // .map summary
        if (d.map) {
            body.innerHTML += '<div class="section-title">.map (resumen grafico)</div>';
            const pre = document.createElement('div');
            pre.className = 'dat-content';
            pre.textContent = `Version: ${d.map.version}\nCapa 1: ${d.map.layers[0]} tiles\nCapa 2: ${d.map.layers[1]} tiles\nCapa 3: ${d.map.layers[2]} tiles\nCapa 4: ${d.map.layers[3]} tiles\nTriggers: ${d.map.triggers}\nBloqueados: ${d.map.blocked}\nTotal GrhIndex: ${d.map.totalGrh}`;
            body.appendChild(pre);
        }

        card.appendChild(header);
        card.appendChild(body);
        container.appendChild(card);
    }
}

function makeTable(headers, rows) {
    const table = document.createElement('table');
    table.className = 'data-table';
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    for (const h of headers) { const th = document.createElement('th'); th.textContent = h; tr.appendChild(th); }
    thead.appendChild(tr);
    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    for (const row of rows) {
        const tr2 = document.createElement('tr');
        for (const cell of row) { const td = document.createElement('td'); td.textContent = cell; tr2.appendChild(td); }
        tbody.appendChild(tr2);
    }
    table.appendChild(tbody);
    return table;
}

function toggleAll(open) {
    document.querySelectorAll('.map-card').forEach(c => {
        if (open) c.classList.add('open'); else c.classList.remove('open');
    });
}

// ============================================================
// JSON - Compact format for copying
// ============================================================

function buildJSON(nums) {
    // Build compact JSON with ALL tile data for perfect reconstruction
    // Each tile: [x, y, blocked, trigger, exitMap, exitX, exitY, npcIndex, objIndex, objAmount]
    const output = { _fmt: "TDS_INF_V1", _tileFormat: "[x,y,blocked,trigger,exitMap,exitX,exitY,npcIndex,objIndex,objAmount]", maps: {} };
    for (const num of nums) {
        const d = parsedData[num];
        const entry = {};

        if (d.dat && Object.keys(d.dat).length > 0) entry.dat = d.dat;

        if (d.inf) {
            // Store ALL tiles with any data - complete record per tile
            entry.inf = { v: d.inf.version, tiles: d.inf.tiles, stats: d.inf.stats };
        }

        if (Object.keys(entry).length > 0) output.maps[num] = entry;
    }

    const json = JSON.stringify(output);
    const ta = document.getElementById('jsonOutput');
    ta.value = json;
    ta.style.display = 'block';
}

function copyJSON() {
    const ta = document.getElementById('jsonOutput');
    navigator.clipboard.writeText(ta.value).then(() => {
        const s = document.getElementById('copyStatus');
        s.classList.add('show');
        setTimeout(() => s.classList.remove('show'), 2000);
    });
}
